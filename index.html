<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> Interactive Quiz App </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="start-container" class="card">
            <h1>FOLARIN, WELCOME TO THIS BREATH TAKING QUIZ</h1>
            <p>High Score: <span id="high-score-display">0</span> </p>
            <button id="start-btn" class="btn">Start Quiz</button>
        </div>
        <div id="quiz-container" class="card hidden">
            <div id="timer-box">Time left: <span id="timer">15</span>s</div>
            <h2 id="question-text"> question Placeholder</h2>
            <div id="options-container"></div>
        </div>
        <div id="result-container" class="card hidden">
            <h2>Quiz Completed <span style="color: red; font-weight: bold;">OLODO Rabata</span> </h2>
            <p id="final-score">You Scored: 0/0</p>
            <h3>Review your answers:</h3>
            <div id="review-container"></div>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
